<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline - AI Memory OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-link { transition: all 0.2s; }
        .nav-link:hover { color: #60a5fa; }
        .nav-link.active { color: #60a5fa; border-bottom: 2px solid #60a5fa; }
        
        /* Heatmap styles */
        .heatmap-cell { 
            width: 12px; 
            height: 12px; 
            border-radius: 2px;
            transition: all 0.2s;
        }
        .heatmap-cell:hover { 
            transform: scale(1.3);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }
        
        /* Timeline styles */
        .timeline-item { 
            position: relative;
            padding-left: 28px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 8px;
            bottom: -16px;
            width: 2px;
            background: linear-gradient(180deg, #3b82f6, transparent);
        }
        .timeline-item:last-child::before { display: none; }
        .timeline-dot {
            position: absolute;
            left: 0;
            top: 6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid #0f172a;
        }
        
        .layer-L1 { background: #3b82f6; }
        .layer-L2 { background: #f59e0b; }
        .layer-L3 { background: #8b5cf6; }
        .layer-L4 { background: #ef4444; }
        
        .heatmap-level-0 { background: rgba(30, 41, 59, 0.5); }
        .heatmap-level-1 { background: rgba(59, 130, 246, 0.3); }
        .heatmap-level-2 { background: rgba(59, 130, 246, 0.5); }
        .heatmap-level-3 { background: rgba(59, 130, 246, 0.7); }
        .heatmap-level-4 { background: rgba(59, 130, 246, 0.9); }
    </style>
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i data-lucide="sparkles" class="w-8 h-8 text-blue-500"></i>
                    <h1 class="text-4xl font-bold gradient-text">AI Memory OS</h1>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="mb-8 flex gap-6 border-b border-slate-700 pb-4">
            <a href="index.html" class="nav-link flex items-center gap-2 pb-2">
                <i data-lucide="home" class="w-4 h-4"></i> 首页
            </a>
            <a href="galaxy.html" class="nav-link flex items-center gap-2 pb-2">
                <i data-lucide="network" class="w-4 h-4"></i> Memory Galaxy
            </a>
            <a href="timeline.html" class="nav-link active flex items-center gap-2 pb-2">
                <i data-lucide="calendar" class="w-4 h-4"></i> 时间线
            </a>
            <a href="intent.html" class="nav-link flex items-center gap-2 pb-2">
                <i data-lucide="target" class="w-4 h-4"></i> 目标轨道
            </a>
        </nav>

        <!-- Activity Heatmap -->
        <div class="card rounded-2xl p-6 mb-8">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        <i data-lucide="flame" class="w-5 h-5 text-orange-500"></i>
                        活动热力图
                    </h2>
                    <p class="text-slate-400 text-sm mt-1">近30天记忆活动强度</p>
                </div>
                <div class="flex items-center gap-4 text-sm">
                    <span class="text-slate-400">少</span>
                    <div class="flex gap-1">
                        <div class="heatmap-cell heatmap-level-0"></div>
                        <div class="heatmap-cell heatmap-level-1"></div>
                        <div class="heatmap-cell heatmap-level-2"></div>
                        <div class="heatmap-cell heatmap-level-3"></div>
                        <div class="heatmap-cell heatmap-level-4"></div>
                    </div>
                    <span class="text-slate-400">多</span>
                </div>
            </div>
            <div id="heatmap" class="overflow-x-auto">
                <!-- Heatmap will be rendered here -->
            </div>
        </div>

        <!-- Timeline View -->
        <div class="grid lg:grid-cols-3 gap-6">
            <!-- Timeline List -->
            <div class="lg:col-span-2">
                <div class="card rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <i data-lucide="git-commit" class="w-5 h-5 text-blue-500"></i>
                            记忆时间线
                        </h2>
                        <select id="timeline-filter" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1 text-sm" onchange="renderTimeline()">
                            <option value="all">全部层级</option>
                            <option value="L1">L1 情境层</option>
                            <option value="L2">L2 行为层</option>
                            <option value="L3">L3 认知层</option>
                        </select>
                    </div>
                    <div id="timeline-list" class="space-y-6">
                        <!-- Timeline items will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- Stats Sidebar -->
            <div class="space-y-6">
                <!-- Monthly Stats -->
                <div class="card rounded-2xl p-6">
                    <h3 class="font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="bar-chart" class="w-4 h-4 text-emerald-500"></i>
                        月度统计
                    </h3>
                    <div id="monthly-stats" class="space-y-3">
                        <!-- Monthly stats will be rendered here -->
                    </div>
                </div>

                <!-- Activity Summary -->
                <div class="card rounded-2xl p-6">
                    <h3 class="font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="pie-chart" class="w-4 h-4 text-purple-500"></i>
                        活动分布
                    </h3>
                    <div id="activity-distribution" class="space-y-3">
                        <!-- Distribution will be rendered here -->
                    </div>
                </div>

                <!-- Recent Highlights -->
                <div class="card rounded-2xl p-6">
                    <h3 class="font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="star" class="w-4 h-4 text-amber-500"></i>
                        近期亮点
                    </h3>
                    <div id="recent-highlights" class="space-y-3 text-sm">
                        <!-- Highlights will be rendered here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 pt-8 border-t border-slate-800 text-center text-slate-500 text-sm">
            <p>AI Memory OS © 2026 | 基于 5 层记忆架构构建</p>
        </footer>
    </div>

    <script>
        let allData = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            await loadData();
            renderHeatmap();
            renderTimeline();
            renderMonthlyStats();
            renderActivityDistribution();
            renderRecentHighlights();
        });

        // Load data
        async function loadData() {
            try {
                const [l1, l2, l3, stats] = await Promise.all([
                    fetch('data/memories-l1.json').then(r => r.json()),
                    fetch('data/memories-l2.json').then(r => r.json()),
                    fetch('data/memories-l3.json').then(r => r.json()),
                    fetch('data/stats.json').then(r => r.json())
                ]);
                allData = { l1, l2, l3, stats };
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        // Render GitHub-style heatmap
        function renderHeatmap() {
            const container = document.getElementById('heatmap');
            const heatmapData = allData.stats?.activity_heatmap?.data || [];
            
            // Generate last 30 days
            const days = [];
            for (let i = 29; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                days.push({
                    date: d.toISOString().split('T')[0],
                    count: 0,
                    level: 0
                });
            }
            
            // Merge with actual data
            heatmapData.forEach(d => {
                const day = days.find(day => day.date === d.date);
                if (day) {
                    day.count = d.count;
                    day.level = d.level;
                }
            });

            // Build heatmap grid (5 rows x 6-7 cols)
            let html = '<div class="flex gap-1">';
            
            // Group by weeks
            for (let week = 0; week < 5; week++) {
                html += '<div class="flex flex-col gap-1">';
                for (let day = 0; day < 7; day++) {
                    const idx = week * 7 + day;
                    if (idx < days.length) {
                        const d = days[idx];
                        html += `
                            <div class="heatmap-cell heatmap-level-${d.level}" 
                                 title="${d.date}: ${d.count} 条记忆"></div>
                        `;
                    }
                }
                html += '</div>';
            }
            html += '</div>';

            // Add month labels
            html += '<div class="flex gap-8 mt-2 text-xs text-slate-500">';
            html += '<span>30天前</span>';
            html += '<span>今天</span>';
            html += '</div>';

            container.innerHTML = html;
        }

        // Render timeline
        function renderTimeline() {
            const container = document.getElementById('timeline-list');
            const filter = document.getElementById('timeline-filter').value;
            
            let items = [];

            // Collect L1 memories
            if (filter === 'all' || filter === 'L1') {
                allData.l1?.memories?.forEach(m => {
                    items.push({
                        date: m.date,
                        title: m.title,
                        layer: 'L1',
                        layerName: '情境层',
                        summary: m.summary,
                        tags: m.tags,
                        participants: m.participants
                    });
                });
            }

            // Collect L2 patterns
            if (filter === 'all' || filter === 'L2') {
                allData.l2?.patterns?.forEach(p => {
                    items.push({
                        date: p.created,
                        title: p.name,
                        layer: 'L2',
                        layerName: '行为层',
                        summary: p.definition,
                        tags: [p.category],
                        observation_count: p.observation_count
                    });
                });
            }

            // Collect L3 frameworks
            if (filter === 'all' || filter === 'L3') {
                allData.l3?.frameworks?.forEach(f => {
                    items.push({
                        date: f.created,
                        title: f.name,
                        layer: 'L3',
                        layerName: '认知层',
                        summary: f.core_proposition,
                        tags: [f.category]
                    });
                });
            }

            // Sort by date desc
            items.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (items.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-500">暂无记忆</div>';
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="timeline-item">
                    <div class="timeline-dot layer-${item.layer}"></div>
                    <div class="card rounded-xl p-4">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-medium px-2 py-1 rounded-full bg-slate-800 text-slate-300">
                                    ${item.layer} ${item.layerName}
                                </span>
                                <span class="text-sm text-slate-400">${item.date}</span>
                            </div>
                        </div>
                        <h4 class="font-medium mb-2">${item.title}</h4>
                        <p class="text-sm text-slate-400 mb-3">${item.summary?.substring(0, 100)}${item.summary?.length > 100 ? '...' : ''}</p>
                        ${item.tags ? `
                            <div class="flex flex-wrap gap-1">
                                ${item.tags.slice(0, 3).map(t => `<span class="text-xs px-2 py-1 bg-slate-800 rounded text-slate-400">${t}</span>`).join('')}
                            </div>
                        ` : ''}
                        ${item.observation_count ? `
                            <div class="mt-2 text-xs text-slate-500">
                                <i data-lucide="eye" class="w-3 h-3 inline mr-1"></i>
                                观察 ${item.observation_count} 次
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        // Render monthly stats
        function renderMonthlyStats() {
            const container = document.getElementById('monthly-stats');
            const growth = allData.stats?.growth_trend;
            
            if (!growth) {
                container.innerHTML = '<div class="text-slate-500 text-sm">暂无数据</div>';
                return;
            }

            container.innerHTML = `
                <div class="flex justify-between items-center py-2 border-b border-slate-700/50">
                    <span class="text-slate-400">L1 记忆</span>
                    <div class="flex items-center gap-2">
                        <span class="font-medium">${growth.l1_growth?.[1]?.count || 0}</span>
                        <span class="text-xs text-emerald-500">↗</span>
                    </div>
                </div>
                <div class="flex justify-between items-center py-2 border-b border-slate-700/50">
                    <span class="text-slate-400">L2 模式</span>
                    <div class="flex items-center gap-2">
                        <span class="font-medium">${growth.l2_confirmed?.[0]?.count || 0}</span>
                        <span class="text-xs text-slate-500">确认</span>
                    </div>
                </div>
                <div class="flex justify-between items-center py-2">
                    <span class="text-slate-400">L3 框架</span>
                    <div class="flex items-center gap-2">
                        <span class="font-medium">${growth.l3_confirmed?.[0]?.count || 0}</span>
                        <span class="text-xs text-emerald-500">↗</span>
                    </div>
                </div>
            `;
        }

        // Render activity distribution
        function renderActivityDistribution() {
            const container = document.getElementById('activity-distribution');
            const l1 = allData.l1?.stats?.total_memories || 0;
            const l2 = allData.l2?.stats?.confirmed_patterns || 0;
            const l3 = allData.l3?.stats?.confirmed_frameworks || 0;
            const total = l1 + l2 + l3;

            const bars = [
                { label: 'L1 情境层', count: l1, color: '#3b82f6', percent: total ? (l1 / total * 100) : 0 },
                { label: 'L2 行为层', count: l2, color: '#f59e0b', percent: total ? (l2 / total * 100) : 0 },
                { label: 'L3 认知层', count: l3, color: '#8b5cf6', percent: total ? (l3 / total * 100) : 0 }
            ];

            container.innerHTML = bars.map(b => `
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-slate-400">${b.label}</span>
                        <span class="font-medium">${b.count}</span>
                    </div>
                    <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                        <div class="h-full rounded-full transition-all duration-500" 
                             style="width: ${b.percent}%; background: ${b.color}"></div>
                    </div>
                </div>
            `).join('');
        }

        // Render recent highlights
        function renderRecentHighlights() {
            const container = document.getElementById('recent-highlights');
            const memories = allData.l1?.memories?.slice(0, 3) || [];

            container.innerHTML = memories.map(m => `
                <div class="p-3 bg-slate-800/50 rounded-lg">
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                        <span class="text-slate-300 font-medium">${m.title}</span>
                    </div>
                    <p class="text-slate-500 text-xs">${m.date}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
