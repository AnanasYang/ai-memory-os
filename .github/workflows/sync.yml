name: Hourly Memory Sync

on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点运行
  workflow_dispatch:     # 允许手动触发
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout AI Memory OS
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Clone AI Memory System
        run: |
          git clone --depth 1 https://github.com/AnanasYang/ai-memory-system.git /tmp/ai-memory-system
          
      - name: Sync Memory Data
        run: |
          node scripts/sync-data.js
          
      - name: Check for Changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "🔄 auto-sync: update memories from ai-memory-system [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
